<text x="480" y="304.64" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">Đào tạo RL: ~9 ngày / số bước 400</text>
<text x="480" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal"><tspan x="480" dy="319.76">Mỗi bước: Câu hỏi 32 × Ứng viên 16</tspan><tspan x="480" dy="15.12">= 512</tspan></text>
<text x="480" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal"><tspan x="480" dy="350">Số vòng tương tác/phản hồi 7-9</tspan><tspan x="480" dy="15.12">trung bình</tspan></text>
