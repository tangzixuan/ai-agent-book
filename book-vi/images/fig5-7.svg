<rect x="620" y="98" width="230" height="108" rx="3" fill="#f5f5f5" stroke="#999999" stroke-width="2" />
<text x="628" y="103.4" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central">Báo cáo vấn đề:</text>
<text x="628" y="0" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central"><tspan x="628" dy="114.2">Mức độ ưu tiên: P1 (nguy cơ người dùng</tspan><tspan x="628" dy="10.8">rời bỏ)</tspan></text>
<text x="628" y="135.8" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central">Mô-đun: cancellation_handler</text>
<text x="628" y="0" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central"><tspan x="628" dy="146.6">Mô tả: Không có thông báo nào được gửi</tspan><tspan x="628" dy="10.8">sau khi hủy không thành công.</tspan></text>
<text x="628" y="0" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central"><tspan x="628" dy="168.2">Người dùng giải thích lý do và lựa chọn</tspan><tspan x="628" dy="10.8">thay thế</tspan></text>
<text x="628" y="189.8" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central">Đề xuất: Thêm mô tả về lý do lỗi</text>
<text x="628" y="200.6" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central">và hướng dẫn mua bảo hiểm</text>
