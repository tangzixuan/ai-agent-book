<text x="320" y="0" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central"><tspan x="320" dy="86">Đầu vào: trajectory + tài liệu kiến ​​trúc +</tspan><tspan x="320" dy="10.8">PRD</tspan></text>
<text x="320" y="107.6" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central" />
<text x="320" y="118.4" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central">Kích thước phân tích:</text>
<text x="320" y="0" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central"><tspan x="320" dy="129.2">- Quá trình thực hiện có đáp ứng được mong</tspan><tspan x="320" dy="10.8">đợi hay không</tspan></text>
<text x="320" y="150.8" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central">- Lệnh gọi tool có đúng không?</text>
<text x="320" y="161.6" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central">- Xử lý lỗi có phù hợp không</text>
<text x="320" y="172.4" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central">- Trải nghiệm người dùng có hài lòng không?</text>
<text x="320" y="183.2" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central" />
