<text x="390" y="486.95" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Phối cảnh Manager: gọi Agent = tool gọi (gửi yêu cầu → nhận phản hồi)</text>
