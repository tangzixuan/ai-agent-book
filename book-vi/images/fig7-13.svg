<text x="390" y="360.68" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">L = -E[ min(r(θ)·A, clip(r(θ), 1-ε, 1+ε)·A) ]</text>
<text x="390" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal"><tspan x="390" dy="376.88">Phạm vi cắt đối xứng [1-ε, 1+ε], ε=0.2 · Ưu điểm đến từ sự so sánh tương đối trong nhóm mà</tspan><tspan x="390" dy="15.12">không cần mạng giá trị</tspan></text>
<text x="390" y="435" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Ưu điểm cốt lõi của GRPO</text>
<text x="390" y="460" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal"><tspan x="390" dy="-8.26">Không cần mô hình phần thưởng/mạng giá trị · So sánh tương đối trong các nhóm · Duy trì khả năng khám</tspan><tspan x="390" dy="16.52">phá trực tuyến · Thích hợp cho các kịch bản phần thưởng có thể kiểm chứng</tspan></text>
