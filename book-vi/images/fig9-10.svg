<text x="390" y="288.18" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15.15" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Ví dụ thu phóng (Màn hình 16:9 → FWXGA)</text>
<text x="390" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13.26" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal"><tspan x="390" dy="303.52">Ảnh chụp màn hình: 2560×1440 → 1366×768 (×0.53) | Tọa độ: Mô hình (683, 384) → Thực tế (1280,</tspan><tspan x="390" dy="14.32">720) (×1.87)</tspan></text>
