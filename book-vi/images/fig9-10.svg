<text x="390" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal"><tspan x="390" dy="233.78">①Chọn độ phân giải mục tiêu theo tỷ lệ khung hình → ②ImageMagick để giảm ảnh chụp màn hình → ③Suy</tspan><tspan x="390" dy="14.04">luận mô hình để tạo tọa độ → ④Phóng to theo tỷ lệ → ⑤thực thi xdotool</tspan></text>
