<text x="160" y="117.68" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Episodic</text>
<text x="160" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal"><tspan x="160" dy="132.8">Chuỗi sự kiện có siêu dữ</tspan><tspan x="160" dy="15.12">liệu</tspan></text>
<rect x="360" y="80" width="200" height="84" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2" />
<text x="460" y="99.32" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">trí nhớ ngữ nghĩa</text>
<text x="460" y="117.68" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Semantic</text>
<text x="460" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal"><tspan x="460" dy="132.8">tóm tắt kiến ​​thức tổng</tspan><tspan x="460" dy="15.12">quát</tspan></text>
<rect x="660" y="80" width="200" height="84" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2" />
<text x="760" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16.71" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold"><tspan x="760" dy="94.02">bộ nhớ chương</tspan><tspan x="760" dy="18.05">trình</tspan></text>
<text x="760" y="127.41" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.7" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Procedural</text>
<text x="760" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.7" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal"><tspan x="760" dy="140.05">Quy trình hành vi có thể</tspan><tspan x="760" dy="12.64">tái sử dụng</tspan></text>
