<text x="250" y="210" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">Chuyển giao có chọn lọc ↑</text>
<text x="560" y="210" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">↓Kích hoạt tải</text>
<text x="460" y="60" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Trí nhớ dài hạn (qua các phiên)</text>
<text x="460" y="372" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal"><tspan x="460" dy="-8.26">Tương tác động giữa bộ nhớ làm việc và bộ nhớ dài hạn: thông tin quan trọng được ghi có chọn lọc và các bộ nhớ liên quan</tspan><tspan x="460" dy="16.52">được kích hoạt theo yêu cầu</tspan></text>
