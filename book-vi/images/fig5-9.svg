<text x="440" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold"><tspan x="440" dy="460.62">Luồng dữ liệu: DB → Giao diện người dùng → Trực</tspan><tspan x="440" dy="12.96">quan hóa (bỏ qua hoàn toàn LLM)</tspan></text>
<text x="440" y="485.46" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="normal">LLM chỉ chịu trách nhiệm tạo mã và không tham gia truyền dữ liệu.</text>
