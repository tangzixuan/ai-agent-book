<text x="440" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.78" fill="#cccccc" text-anchor="middle" dominant-baseline="central" font-weight="normal"><tspan x="440" dy="270.91">Đánh giá không đồng nhất đa nguồn để ngăn</tspan><tspan x="440" dy="12.72">ngừa sai lệch tương đồng</tspan></text>
<line x1="440" y1="295" x2="440" y2="325" stroke="#333333" stroke-width="2" marker-end="url(#ah)" />
<rect x="60" y="328" width="760" height="180" rx="6" fill="#ffffff" stroke="#333333" stroke-width="2" stroke-dasharray="8,4" />
<text x="440" y="350" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Đầu ra đánh giá có cấu trúc</text>
<rect x="75" y="370" width="360" height="125" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2" />
<text x="85" y="413.06" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">tính đúng đắn thực tế</text>
<text x="250" y="372.05" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10.65" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">4/4</text>
<text x="300" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal"><tspan x="300" dy="383.2">Số lượng và thời</tspan><tspan x="300" dy="10.8">gian là chính xác</tspan></text>
<text x="85" y="426.02" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">chính trực</text>
<text x="250" y="405.15" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10.65" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">3/4</text>
<text x="300" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal"><tspan x="300" dy="416.3">Thiếu hướng dẫn về</tspan><tspan x="300" dy="10.8">phương thức hoàn</tspan><tspan x="300" dy="10.8">tiền</tspan></text>
<text x="85" y="438.98" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">Phát hiện ảo giác</text>
<text x="250" y="449.05" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10.65" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">PASS</text>
<text x="300" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal"><tspan x="300" dy="460.2">Không có thông tin</tspan><tspan x="300" dy="10.8">sai sự thật</tspan></text>
<text x="85" y="451.94" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">sự mạch lạc logic</text>
<text x="250" y="482.15" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10.65" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">4/4</text>
<text x="300" y="493.3" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">Rõ ràng nhân quả</text>
<rect x="460" y="370" width="345" height="125" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2" />
<text x="632" y="432.5" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Chiến lược tổng hợp xếp hạng</text>
<text x="475" y="0" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central"><tspan x="475" dy="393.62">Trung bình có trọng số: Σ(điểm trọng lượng×thứ</tspan><tspan x="475" dy="12.96">nguyên)</tspan></text>
<text x="475" y="0" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central"><tspan x="475" dy="419.54">Quyền phủ quyết một phiếu: ảo giác=FAIL → tổng số</tspan><tspan x="475" dy="12.96">điểm=0</tspan></text>
<text x="475" y="445.46" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">Nhiều giám khảo: 3 giám khảo lấy trung vị</text>
<text x="475" y="0" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central"><tspan x="475" dy="458.42">Thẻ trường hợp viền: Không đồng ý&gt;Điểm 2→Đánh giá</tspan><tspan x="475" dy="12.96">của con người</tspan></text>
