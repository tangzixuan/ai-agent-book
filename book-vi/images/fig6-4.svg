<text x="305" y="102.6" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">Đầu ra Agent:</text>
<text x="305" y="0" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central"><tspan x="305" dy="115.56">"Việc hoàn tiền đã được xử lý, $150</tspan><tspan x="305" dy="12.96">sẽ được xử lý</tspan></text>
<text x="305" y="0" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central"><tspan x="305" dy="141.48">3-5 sẽ đến trong vòng ngày làm</tspan><tspan x="305" dy="12.96">việc. "</tspan></text>
<text x="305" y="167.4" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central" />
<rect x="570" y="60" width="250" height="150" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2" />
<text x="695" y="0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold"><tspan x="695" dy="126.36">Kế hoạch tham khảo (tùy</tspan><tspan x="695" dy="17.28">chọn)</tspan></text>
<line x1="580" y1="94" x2="810" y2="94" stroke="#999999" stroke-width="2" />
<text x="585" y="115.56" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">Câu trả lời/điểm tiêu chuẩn:</text>
<text x="585" y="128.52" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">Phải bao gồm số tiền hoàn lại</text>
<text x="585" y="141.48" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">Phải bao gồm thời gian đến</text>
