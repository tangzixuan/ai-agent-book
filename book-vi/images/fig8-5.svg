<text x="440.0" y="184" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal"><tspan x="440" dy="-9.44">Sau khi đăng ký, các tool mới có thể được sử dụng lại trong các nhiệm vụ tiếp theo, liên tục mở rộng</tspan><tspan x="440" dy="18.88">ranh giới khả năng.</tspan></text>
