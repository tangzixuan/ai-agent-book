<rect x="60" y="70" width="180" height="60" rx="4" fill="#f5f5f5" stroke="#333333" stroke-width="2"/>
<text x="150" y="90" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">входное изображение</text>
<text x="150" y="110" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">(водопад/город/природа)</text>
<line x1="150" y1="132" x2="150" y2="158" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="500" y="70" width="220" height="60" rx="4" fill="#f5f5f5" stroke="#333333" stroke-width="2"/>
<text x="610" y="90" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">описание вывода</text>
<text x="610" y="110" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="7.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">"огромный водопад с радугой рядом"</text>
<line x1="610" y1="158" x2="610" y2="132" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<text x="390" y="378" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">стратегия: заморозить LLM + обучить проекционный слой → разморозить LLM во время SFT (избежать катастрофического забывания)</text>
