<rect x="60" y="405" width="760" height="55" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="80" y="420" font-family="'Courier New', Courier, monospace" font-size="15" fill="#333333" text-anchor="start" dominant-baseline="central">Эксперимент DeepSeek: генеративные 8 оценок дают 6-7 аналитических точек зрения</text>
<text x="80" y="442" font-family="'Courier New', Courier, monospace" font-size="9" fill="#333333" text-anchor="start" dominant-baseline="central">Значительное улучшение после комплексной многоракурсной диагностики (иллюстративно) — обучение направлению улучшения из единичной ошибки</text>
