<rect x="652.5" y="146" width="190" height="210" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="662.5" y="165" font-family="'Courier New', Courier, monospace" font-size="6.5" fill="#333333" text-anchor="start" dominant-baseline="central">Аспект 1: Точное использование инструментов</text>
<text x="662.5" y="191" font-family="'Courier New', Courier, monospace" font-size="6.5" fill="#333333" text-anchor="start" dominant-baseline="central">Аспект 2: Сбор недостающей информации</text>
<text x="662.5" y="217" font-family="'Courier New', Courier, monospace" font-size="7" fill="#333333" text-anchor="start" dominant-baseline="central">Аспект 3: Перефразирование названия плана</text>
<text x="662.5" y="243" font-family="'Courier New', Courier, monospace" font-size="7" fill="#333333" text-anchor="start" dominant-baseline="central">  Ошибка → Предложить прямое повторение</text>
<text x="662.5" y="269" font-family="'Courier New', Courier, monospace" font-size="6" fill="#333333" text-anchor="start" dominant-baseline="central">Аспект 4: нет объяснения использования данных</text>
<text x="662.5" y="295" font-family="'Courier New', Courier, monospace" font-size="6" fill="#333333" text-anchor="start" dominant-baseline="central">Аспект 5: Отсутствие проверки идентичности агента</text>
<text x="662.5" y="321" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central">→ 6-7 аналитических ракурсов</text>
