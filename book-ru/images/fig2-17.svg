<rect x="168" y="417" width="330" height="40" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="333" y="437" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Сжатое содержимое + сохранение маркеров ссылок URL</text>
<line x1="500" y1="437" x2="513" y2="437" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="516" y="417" width="275" height="40" rx="4" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="653" y="437" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">45K токенов · 1.4%</text>
<rect x="30" y="465" width="130" height="26" rx="13" fill="#999999" stroke="#333333" stroke-width="2"/>
<text x="95.0" y="478.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold">⑥ Адаптивное окно</text>
<rect x="30" y="495" width="120" height="40" rx="4" fill="#e8e8e8" stroke="#333333" stroke-width="2"/>
<text x="90" y="515" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Отложенное сжатие</text>
<line x1="152" y1="515" x2="165" y2="515" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="168" y="495" width="330" height="40" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="333" y="515" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="8.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">&lt; 80% окна сохранять исходный текст, пакетное сжатие при превышении</text>
<line x1="500" y1="515" x2="513" y2="515" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="516" y="495" width="275" height="40" rx="4" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="653" y="515" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">181K токенов · максимальная точность</text>
