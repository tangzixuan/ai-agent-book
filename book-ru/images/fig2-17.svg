<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 820 560" width="820" height="560" style="background:#ffffff">
<defs><marker id="ah" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#333333"/></marker><marker id="ah-light" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#999999"/></marker></defs>

<text x="410" y="58" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Каждый поиск возвращает ~70K символов → стратегии обрабатывают это по-своему</text>
<rect x="30" y="75" width="130" height="26" rx="13" fill="#999999" stroke="#333333" stroke-width="2"/>
<text x="95.0" y="88.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13.5" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold">① Без сжатия</text>
<rect x="30" y="105" width="120" height="40" rx="4" fill="#e8e8e8" stroke="#333333" stroke-width="2"/>
<text x="90" y="125" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Оставить как есть</text>
<line x1="152" y1="125" x2="165" y2="125" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="168" y="105" width="330" height="40" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="333" y="125" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Полный исходный текст в контекст</text>
<line x1="500" y1="125" x2="513" y2="125" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="516" y="105" width="275" height="40" rx="4" fill="#ffffff" stroke="#333333" stroke-width="2"/>
<text x="653" y="125" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">&gt; 110K токенов → переполнение</text>
<rect x="30" y="153" width="130" height="26" rx="13" fill="#999999" stroke="#333333" stroke-width="2"/>
<text x="95.0" y="166.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="8" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold">② Индивидуальное резюме</text>
<rect x="30" y="183" width="120" height="40" rx="4" fill="#e8e8e8" stroke="#333333" stroke-width="2"/>
<text x="90" y="203" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Независимое резюме</text>
<line x1="152" y1="203" x2="165" y2="203" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="168" y="183" width="330" height="40" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="333" y="203" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Каждый результат независимо генерирует резюме из 2-3 абзацев</text>
