<rect x="516" y="183" width="275" height="40" rx="4" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="653" y="203" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">123K ток. · 6.8%</text>
<rect x="30" y="231" width="130" height="26" rx="13" fill="#999999" stroke="#333333" stroke-width="2"/>
<text x="95.0" y="244.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold">③ Объединённое резюме</text>
<rect x="30" y="261" width="120" height="40" rx="4" fill="#e8e8e8" stroke="#333333" stroke-width="2"/>
<text x="90" y="281" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Объединённое резюме</text>
<line x1="152" y1="281" x2="165" y2="281" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="168" y="261" width="330" height="40" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="333" y="281" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Все результаты объединяются, затем единое резюме</text>
<line x1="500" y1="281" x2="513" y2="281" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="516" y="261" width="275" height="40" rx="4" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="653" y="281" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">55K токенов · 2.1%</text>
<rect x="30" y="309" width="130" height="26" rx="13" fill="#666666" stroke="#333333" stroke-width="2"/>
<text x="95.0" y="322.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold">④ С учётом контекста</text>
