<text x="90" y="359" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="8" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Интеллектуальное сжатие</text>
<line x1="152" y1="359" x2="165" y2="359" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="168" y="339" width="330" height="40" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="333" y="359" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">При заданном запросе + контексте → целевое сжатие</text>
<line x1="500" y1="359" x2="513" y2="359" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="516" y="339" width="275" height="40" rx="4" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="653" y="359" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">25K токенов · 0.9%</text>
<rect x="30" y="387" width="130" height="26" rx="13" fill="#999999" stroke="#333333" stroke-width="2"/>
<text x="95.0" y="400.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="5.5" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold">⑤ Контекст-осведомлённость + цитаты</text>
<rect x="30" y="417" width="120" height="40" rx="4" fill="#e8e8e8" stroke="#333333" stroke-width="2"/>
<text x="90" y="437" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="5.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Интеллектуальность + трассируемость</text>
