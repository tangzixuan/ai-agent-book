<line x1="532" y1="122" x2="568" y2="122" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<line x1="568" y1="138" x2="532" y2="138" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="50" y="220" width="720" height="290" rx="8" fill="#ffffff" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>
<text x="62" y="238" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="bold">Цикл ReAct</text>
<rect x="80" y="260" width="300" height="40" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="90" y="280" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10.5" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">user: "Сколько времени и какая погода в Ванкувере?"</text>
<rect x="80" y="310" width="300" height="55" rx="6" fill="#e8e8e8" stroke="#333333" stroke-width="2"/>
<text x="90" y="328" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">&lt;think&gt;</text>
<text x="90" y="348" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">Нужно вызвать get_current_time</text>
<text x="90" y="363" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">и инструменты get_temperature</text>
<line x1="230" y1="302" x2="230" y2="308" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="80" y="375" width="300" height="50" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="90" y="393" font-family="'Courier New', Courier, monospace" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central">&lt;tool_call&gt;</text>
<text x="90" y="411" font-family="'Courier New', Courier, monospace" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central">{&quot;name&quot;:&quot;get_current_time&quot;,...}</text>
<line x1="230" y1="367" x2="230" y2="373" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="80" y="435" width="300" height="40" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="90" y="455" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">&lt;tool_response&gt; {&quot;time&quot;:&quot;05:18&quot;,&quot;temp&quot;:&quot;13.2°C&quot;}</text>
<line x1="230" y1="427" x2="230" y2="433" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<path d="M 80,455 Q 40.0,367.5 80,280" fill="none" stroke="#999999" stroke-width="2" marker-end="url(#ah-light)"/>
<text x="30" y="367" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="6.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="bold">Продолжить цикл</text>
<rect x="430" y="280" width="320" height="55" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="440" y="298" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Итоговый результат:</text>
<text x="440" y="318" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">"Ванкувер: 05:18 AM, 13.2°C,</text>
<text x="440" y="335" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">  ясное небо, влажность 93%"</text>
<rect x="430" y="360" width="320" height="80" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="590" y="378" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Потоковая передача ключевых тайм-стемпов</text>
<text x="440" y="400" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">&lt;think&gt;... → скрыто, не показывается пользователю</text>
<text x="440" y="418" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9.5" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">обычный текст → потоковое отображение в реальном времени</text>
<text x="440" y="436" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">&lt;tool_call&gt; → разобрать и выполнить инструмент</text>
</svg>