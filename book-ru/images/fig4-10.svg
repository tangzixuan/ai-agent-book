<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 880 540" width="880" height="540" style="background:#ffffff">
<defs><marker id="ah" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#333333"/></marker><marker id="ah-light" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#999999"/></marker></defs>
<rect x="20" y="50" width="560" height="118" rx="6" fill="#ffffff" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>
<text x="36" y="72" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Статический префикс (побайтно неизменен, KV Cache стабильно попадает)</text>
<rect x="40" y="84" width="520" height="34" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="300.0" y="101" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Системный промпт</text>
<rect x="40" y="124" width="520" height="34" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="300.0" y="141" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Ключевые инструменты: web_search, code_interpreter, tool_search</text>
<rect x="20" y="180" width="560" height="386" rx="6" fill="#ffffff" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>
<text x="36" y="202" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Траектория (только рост, новое — в конец)</text>
<rect x="40" y="214" width="520" height="30" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="300.0" y="229.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">User: запрос цены акций NVDA</text>
<rect x="40" y="250" width="520" height="30" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="300.0" y="265.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Assistant: tool_search_call(цена акций)</text>
<rect x="40" y="286" width="520" height="40" rx="6" fill="#d8e8d8" stroke="#333333" stroke-width="2"/>
<text x="300.0" y="306.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">tool_search_output → внедряется полная schema get_stock_quote</text>
<rect x="40" y="332" width="520" height="30" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="300.0" y="347.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Assistant: вызов get_stock_quote → Tool Result</text>
<rect x="40" y="368" width="520" height="30" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="300.0" y="383.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">User: анализ контрибьюторов репозитория GitHub</text>
<rect x="40" y="404" width="520" height="30" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="300.0" y="419.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Assistant: tool_search_call(GitHub)</text>
<rect x="40" y="440" width="520" height="40" rx="6" fill="#d8e8d8" stroke="#333333" stroke-width="2"/>
<text x="300.0" y="460.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">tool_search_output → внедряются schema list_contributors и др.</text>
<rect x="40" y="486" width="520" height="30" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="300.0" y="501.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Assistant: вызов → Tool Result → ответ</text>
<rect x="40" y="522" width="520" height="30" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="300.0" y="537.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">…… последнее в этом раунде</text>
<line x1="562" y1="306.0" x2="592" y2="306.0" stroke="#333333" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#ah)"/>
<line x1="562" y1="460.0" x2="592" y2="460.0" stroke="#333333" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#ah)"/>
<text x="600" y="294.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10.5" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Первое появление: prefill один раз (запись в кэш)</text>
<text x="600" y="316.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">Далее — обычная история, попадает в кэш</text>
<text x="600" y="448.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Нельзя удалять/переставлять загруженные инструменты</text>
<text x="600" y="470.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">Иначе кэш сбрасывается с точки изменения</text>
</svg>